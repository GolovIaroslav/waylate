name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  appimage:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            file

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run tauri build -- --bundles appimage

      - name: Rename and checksum
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SRC=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          DEST="dist/Waylate-${VERSION}-x86_64.AppImage"
          mkdir -p dist
          cp "$SRC" "$DEST"
          sha256sum "$DEST" > "${DEST}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: waylate-appimage
          path: |
            dist/*.AppImage
            dist/*.AppImage.sha256

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Waylate ${{ github.ref_name }}"
          body: |
            ## Install

            Download `Waylate-${{ github.ref_name }}-x86_64.AppImage`, mark it executable, run:

            ```bash
            chmod +x Waylate-*-x86_64.AppImage
            ./Waylate-*-x86_64.AppImage
            ```

            Requires WebKitGTK on the host (`webkit2gtk-4.1` on Arch, `libwebkit2gtk-4.1-0` on Ubuntu/Debian).
          files: |
            dist/*.AppImage
            dist/*.AppImage.sha256
